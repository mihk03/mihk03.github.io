<!doctype HTML>
<html>
    

<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <body style="margin : 0px; overflow: hidden;">
        <a-scene embedded arjs>
            

            <a-marker preset='custom' type='pattern'  url='pattern-qr-code2.patt' smooth="true" antialias="true">
            
            <a-entity
            position="0 0 0"
            rotation="0 90 0"
            scale="0.25 0.25 0.25"
            gltf-model="main7.gltf"
            animation__rotate = "property: rotation; dur: 40000; easing: linear; dir: normal; from:0 0 0; to: 0 360 0; loop: true;">
      
        </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
        </a-scene>
        <script>
            AFRAME.registerComponent('gesture-handler', {
                init: function () {
                    this.handleRotation = this.handleRotation.bind(this);
                    this.el.sceneEl.addEventListener('onefingermove', this.handleRotation);
                },
                handleRotation: function (event) {
                    var rotation = this.el.getAttribute('rotation');
                    rotation.y += event.detail.positionChange.x * 2;
                    this.el.setAttribute('rotation', rotation);
                }
            });
        </script>
    </body>
</html>
