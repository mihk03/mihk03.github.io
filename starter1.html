<!doctype HTML>
<html>
    

<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <body style="margin : 0px; overflow: hidden;">
        <a-scene arjs="trackingMethod: best;">
            <a-marker preset='custom' type='pattern'  url='pattern-qr-code2.patt'>
            
            <a-entity
            position="0 0 0"
            rotation="0 90 0"
            scale="0.25 0.25 0.25"
            gltf-model="main2.gltf"
            light="type: ambient; color: #ffffff; intensity: 1.5;"
            animation__rotate = "property: rotation; dur: 40000; easing: linear; dir: normal; from:0 0 0; to: 0 360 0; loop: true;"
            arjs-threshold="value: 0.5; pause: true;">
      
        </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
